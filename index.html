<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ผังโต๊ะร้าน Fuel</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, writeBatch, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyByEiQP04T_RxQ88CMZRWxUMI_r9ra5ub4",
      authDomain: "purdto-platform.firebaseapp.com",
      projectId: "purdto-platform",
      messagingSenderId: "670687363597",
      appId: "1:670687363597:web:dd96a5936c87ad27dd0b44"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const restaurantId = "fuel";  // 🔥 เปลี่ยนชื่อร้าน
    const pricePerSeat = 0;
    const selected = new Set();
    const seatElements = {};
    const seatCapacity = {
        "A1": 4, "A2": 4, "A3": 4, "A4": 4, "A5": 4,
        "B1": 4, "B2": 4, "B3": 4, "B4": 4, "B5": 4, "B6": 4,
        "C1": 4, "C2": 4, "C3": 4, "C4": 4,
        "C5": 4, "C6": 4, "C7": 4, "C8": 4
    };

    // ✅ ดึงวันจาก URL ถ้าไม่มี ให้ null
    function getDateFromURL() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('date');
    }
    function getPeopleFromURL() {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get('people');
}

const dateId = getDateFromURL();
const peopleCount = parseInt(getPeopleFromURL()) || 0;

document.addEventListener("DOMContentLoaded", () => {
  window.peopleCount = peopleCount;
  
     // 1️⃣ Map โต๊ะทั้งหมด
    document.querySelectorAll(".table").forEach(el => {
      const id = el.dataset.table;
      seatElements[id] = el;
    });
//  DOM แล้วค่อยเชื่อม Firestore
    if (dateId) {
  const tablesRef = collection(db, "restaurants", restaurantId, "dates", dateId, "tables");

  onSnapshot(tablesRef, snapshot => {
  let allFull = true; // เริ่มต้นให้ถือว่าโต๊ะเต็มทั้งหมด

  snapshot.docChanges().forEach(change => {
    const id = change.doc.id;
    const data = change.doc.data();
    const seat = seatElements[id];
    if (!seat) return;

    seat.classList.remove("selected", "reserved");

    if (data.status === "reserved") {
      seat.classList.add("reserved");
      seat.onclick = null;
    } else if (data.status === "blocked") {
      seat.classList.add("reserved");
      seat.textContent = "❌";
      seat.onclick = null;
    } else {
      allFull = false; // มีโต๊ะว่างอย่างน้อย 1 โต๊ะ
      seat.onclick = () => {
        seat.classList.toggle("selected");
        if (selected.has(id)) {
          selected.delete(id);
        } else {
          selected.add(id);
        }
        updateButtonTotal();
        updateMonitor();
      };
    }
  });

  // ✅ ถ้าโต๊ะเต็มทั้งหมด → แสดง modal เฉพาะตอนเปิดหน้าใหม่ ไม่ใช่หลังเพิ่งจอง
if (allFull && !window.justBooked) {
  document.getElementById("fullModal").style.display = "flex";
}

// ✅ ถ้าเพิ่งจองเสร็จ → reset flag หลังผ่านไป 2 วินาที
if (window.justBooked) {
  setTimeout(() => { window.justBooked = false; }, 2000);
}
    });
  } else {
    // กรณีไม่มี dateId อาจจะทำอะไรหรือแจ้งเตือน
    document.getElementById("dateModal").style.display = "flex";
  }
});

    function updateButtonTotal() {
  const total = selected.size * pricePerSeat;
  const btn = document.getElementById("confirmBtn");
  btn.textContent = `จองเลย `;
  btn.disabled = selected.size === 0;

  // เพิ่ม style ตอน disabled (ถ้าต้องการ)
  if (btn.disabled) {
    btn.style.backgroundColor = "#9ca3af";
    btn.style.cursor = "not-allowed";
  } else {
    btn.style.backgroundColor = "#10b981";
    btn.style.cursor = "pointer";
  }
}
function updateMonitor() {
      const selectedSeats = Array.from(selected);
      if (selectedSeats.length === 0) {
        document.querySelector(".screen-content").textContent = "นั่งได้สูงสุด";
      } else {
        const seatLabels = selectedSeats.map(id => {
          return `${id}: ${seatCapacity[id]} คน`;
        }).join(", ");
        document.querySelector(".screen-content").textContent = `ที่นั่งที่เลือก: ${seatLabels}`;
      }
    }

   window.reserveSeats = async (userId) => {
  if (selected.size === 0) {
    alert("กรุณาเลือกที่นั่งก่อน");
    return;
  }

  // 🔔 ให้ผู้ใช้ใส่เบอร์โทรก่อนจอง
let phone = "";
while (true) {
  phone = prompt("📞 กรุณาใส่เบอร์โทรศัพท์สำหรับติดต่อกลับ (10 หลัก):", phone || "");
  
  if (phone === null) {
    // กด “ยกเลิก”
    alert("❌ ยกเลิกการจอง");
    return;
  }

  // ✅ ตรวจสอบความถูกต้องของเบอร์โทร (ต้องเป็นตัวเลข 10 หลัก)
  if (/^[0-9]{10}$/.test(phone.trim())) {
    window.phoneNumber = phone.trim(); // เก็บไว้ใช้ใน flex message
    break; // ออกจาก loop เมื่อเบอร์ถูกต้อง
  } else {
    alert("⚠️ กรุณาใส่เบอร์โทร 10 หลักให้ถูกต้อง");
  }
}

  const now = new Date();
  const batch = writeBatch(db);
  let reservedSeats = 0;

  try {
    for (const id of selected) {
      const ref = doc(db, "restaurants", restaurantId, "dates", dateId, "tables", id);

      batch.set(ref, {
        status: "reserved",
        reservedBy: {
          displayName: window.displayName,
          userId: window.userId,
          phone: window.phoneNumber
        },
        timestamp: now,
        bookingDate: dateId
      }, { merge: true });

      reservedSeats++;
    }

    window.justBooked = true; // ✅ ป้องกัน onSnapshot โชว์ modal หลังจองสำเร็จ
    
    console.log("→ Batch commit starting...");
    await batch.commit();
    console.log("✅ Batch commit success");

    selected.clear();
    updateButtonTotal();

  } catch (error) {
    console.error("❌ Error committing batch:", error);
    alert("❌ เกิดข้อผิดพลาดขณะจองที่นั่ง");
    throw error;
  }
};
 // ✅ Modal confirm date
    window.confirmDate = function () {
      const picker = document.getElementById("modalDatePicker");
      const date = picker.value;
      if (!date) {
        alert("กรุณาเลือกวันที่ก่อน");
        return;
      }
      // ซ่อน modal เลือกวัน
  document.getElementById("dateModal").style.display = "none";
  // โชว์ modal ใส่จำนวนคน
  document.getElementById("peopleModal").style.display = "flex";
  // เก็บวันไว้ใน window ชั่วคราว
  window.selectedDate = date;
};

// ✅ ยืนยันจำนวนคน
window.confirmPeople = function () {
  const num = parseInt(document.getElementById("peopleInput").value);
  if (!num || num <= 0) {
    alert("กรุณาใส่จำนวนคนให้ถูกต้อง");
    return;
  }
  if (num > 5) {
    // โชว์ modal แจ้งเตือน
    document.getElementById("peopleModal").style.display = "none";
    document.getElementById("warningModal").style.display = "flex";
  } else {
    // ไปต่อได้เลย
    window.location.href = `?date=${window.selectedDate}&people=${num}`;
  }
};

// ✅ ปิด warning modal
window.closeWarning = function () {
  document.getElementById("warningModal").style.display = "none";
  // ไปต่อแม้จะเกิน 5 (เพราะเตือนแล้ว)
  window.location.href = `?date=${window.selectedDate}&people=${document.getElementById("peopleInput").value}`;
};
// ✅ ปิด modal โต๊ะเต็ม
window.closeFullModal = function () {
  document.getElementById("fullModal").style.display = "none";
};
    // ✅ ตั้งค่า date picker ใน modal
    window.onload = function () {
      const today = new Date();
      const minDate = today.toISOString().split("T")[0];
      const maxDateObj = new Date(today);
      maxDateObj.setDate(today.getDate() + 6);
      const maxDate = maxDateObj.toISOString().split("T")[0];

      document.getElementById("modalDatePicker").min = minDate;
      document.getElementById("modalDatePicker").max = maxDate;

    
      
    // ✅ LIFF init
   
      liff.init({ liffId: "2007619597-pL1yYoj3" }) // ใส่ LIFF ID จริง
        .then(() => {
          if (!liff.isLoggedIn()) {
            liff.login();
          } else {
            liff.getProfile().then(profile => {
              window.userId = profile.userId;
              window.displayName = profile.displayName;
            });
          }
        })
        .catch(err => {
          console.error("LIFF Initialization failed", err);
        });
    };

    window.bookSeats = async function () {
  if (selected.size === 0) {
    alert("กรุณาเลือกที่นั่งก่อน");
    return;
  }

  const selectedSeats = Array.from(selected);
  const totalPrice = selectedSeats.length * pricePerSeat;

  try {
    // ✅ เรียกจองก่อน (รอให้สำเร็จจริง)
    await window.reserveSeats(window.userId);
    console.log("→ reserveSeats succeeded");

    // 🔒 ตรวจสอบว่าเบอร์โทรยังคงอยู่ (กันกรณีจองล้มเหลวแต่เบอร์หาย)
    if (!window.phoneNumber) {
      console.warn("⚠️ ไม่มีเบอร์โทร — ข้ามการส่ง Flex Message");
      return;
    }

      const flexMessage = {
        type: "flex",
        altText: "📌 ยืนยันการจองโต๊ะ",
        contents: {
          type: "bubble",
          styles: {
            header: { backgroundColor: "#000000" },
            body: { backgroundColor: "#111111" }
          },
          header: {
            type: "box",
            layout: "vertical",
            contents: [{
              type: "text",
              text: "📌 ร้าน Fuel of Life",
              weight: "bold",
              size: "lg",
              color: "#facc15"
            }]
          },
          body: {
            type: "box",
            layout: "vertical",
            spacing: "sm",
            contents: [
              {
                type: "text",
                text: `คุณ ${window.displayName} ได้จองโต๊ะ`,
                weight: "bold",
                size: "md",
                color: "#ffffff"
              },
              {
                type: "text",
                text: `ที่นั่ง: ${selectedSeats.join(", ")}`,
                size: "sm",
                wrap: true,
                color: "#d4d4d4"
              },
              {
                type: "text",
                text: `จำนวนคน: ${window.peopleCount} คน`,
                size: "sm",
                color: "#d4d4d4"
              },
              {
                type: "text",
                text: `วันที่จอง: ${dateId}`,
                size: "sm",
                color: "#d4d4d4"
              },
              { type: "text", 
                text: `เบอร์โทร: ${window.phoneNumber}`,
                size: "sm", 
                color: "#facc15" 
              },
            ]
          }
        }
      };

      await liff.sendMessages([flexMessage]);
    alert("✅ จองสำเร็จกรุณาไปก่อน21:00ก่อนโต๊ะหลุด");
    liff.closeWindow();

  } catch (err) {
    console.error("❌ Booking flow error:", err);
    alert("❌ การจองไม่สำเร็จหรือมีปัญหาระหว่างส่งข้อความ");
  }
};

  </script>

}

   .door {

   .floor-plan {

}

         /* 🔳 Modal เต็มจอ */

    #peopleInput {
  margin-top: 12px;
  padding: 10px;
  width: 100%;

}

</head>
<body>
  <!-- 📅 Modal เต็มจอ -->
  <div id="dateModal" class="modal">
    <div class="modal-content">
      <h2>📅 กรุณาเลือกวันที่</h2>
      <input type="date" id="modalDatePicker">
      <button onclick="confirmDate()">ยืนยัน</button>
    </div>
  </div>

<!-- 🔳 Modal ใส่จำนวนคน -->
<div id="peopleModal" class="modal">
  <div class="modal-content">
    <h2>👥 กรุณาใส่จำนวนคน</h2>
    <input type="number" id="peopleInput" placeholder="จำนวนคน" min="1">
    <button onclick="confirmPeople()">ยืนยัน</button>
  </div>
</div>

<!-- 🔳 Modal แจ้งเตือนเกิน 5 คน -->
